apiVersion: v1
kind: Namespace
metadata:
  name: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
  source:
    path: nextcloud
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
    helm:
      valuesObject:
        bucket: nextcloud-bkt-4f8bfd8a-f59a-4a8e-86cc-0095f4421ad1
        nextcloud:
          ingress:
            className: traefik-public
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            tls:
              - hosts:
                  - cloud.felix-prasse.de
                secretName: nextcloud-cert # < cert-manager will store the created certificate in this secret.
          nextcloud:
            host: "cloud.felix-prasse.de"

        k8s-backup:
          prepareBackupScript: |
            ctx.backup.exec_in_single_deployment_pod("nextcloud",
                                                   ["./occ", "maintenance:mode", "--on"])
            try:
                snapshots = ctx.backup.create_snapshots({"data": "nextcloud-data-new", "app": "nextcloud-app-new"})
                ctx.postgres.dump_postgres("pg-nextcloud", scratch_volume=ctx.scratch_volume)
                ctx.backup.wait_for_snapshots(snapshots)
            finally:
                ctx.backup.exec_in_single_deployment_pod("nextcloud",
                                                     ["./occ", "maintenance:mode", "--off"])

            return snapshots

          repository:
            secret: nextcloud-kopia-repository

  destination:
    server: "https://kubernetes.default.svc"
    namespace: nextcloud
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-internal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
  source:
    path: nextcloud
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
    helm:
      valuesObject:
        nextcloud:
          ingress:
            className: traefik-internal
          nextcloud:
            host: cloud.internal.home.arpa
        postgres:
          version: 18
        k8s-backup:
          prepareBackupScript: |
            ctx.backup.exec_in_single_deployment_pod("nextcloud-internal",
                                                   ["./occ", "maintenance:mode", "--on"])
            try:
                snapshots = ctx.backup.create_snapshots({"data": "nextcloud-data-new", "app": "nextcloud-app-new"})
                ctx.postgres.dump_postgres("pg-nextcloud", scratch_volume=ctx.scratch_volume)
                ctx.backup.wait_for_snapshots(snapshots)
            finally:
                ctx.backup.exec_in_single_deployment_pod("nextcloud-internal",
                                                     ["./occ", "maintenance:mode", "--off"])

            return snapshots

          repository:
            secret: nextcloud-internal-kopia-repository
  destination:
    server: "https://kubernetes.default.svc"
    namespace: internal