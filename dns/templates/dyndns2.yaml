# This is a secondary dyndns update as a backup.
# The primary dyndns updates are handled by OPNSense and update the DNS records at Cloudflare directly.
# Since that failed today, add a secondary dyndns via duckdns to gain access via VPN at least.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: duckdns
  namespace: networking
spec:
  encryptedData:
    token: 
  template:
    metadata:
      creationTimestamp: null
      name: duckdns
      namespace: networking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: duckdns
  name: duckdns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: duckdns
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: duckdns
    spec:
      priorityClassName: base-infra
      containers:
        - image: lscr.io/linuxserver/duckdns:latest
          name: duckdns
          resources: {}
          env:
            - name:  SUBDOMAINS
              value: flx5-nue
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: token
                  name: duckdns