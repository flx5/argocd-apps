apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omada-backup-pvc
spec:
  storageClassName: rook-cephfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omada-backup
spec:
  storageClassName: rook-newfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
