omada-controller-helm:
  service:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: omada.home.arpa
  nodeSelector:
    # Mongo DB 8 requires AVX
    feature.node.kubernetes.io/cpu-cpuid.AVX: "true"
  startupProbe:
    failureThreshold: 60
    periodSeconds: 60
  persistence:
    data:

      storageClassName: rook-newfs
    logs:
      storageClassName: local-path
    extraVolumeMounts:
      - name: omada-backups
        # Determined by omada...
        mountPath: /opt/tplink/EAPController/data/autobackup
    extraVolumes:
      - name: omada-backups
        persistentVolumeClaim:
          claimName: omada-backup

k8s-backup:
  prepareBackupScript: |
    snapshots = ctx.backup.create_snapshots({"autobackup": "omada-backup2"})
    ctx.backup.wait_for_snapshots(snapshots)
    return snapshots

  repository:
    secret: omada-controller-kopia-repository